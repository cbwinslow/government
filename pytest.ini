[pytest]
# Do not recurse into sub-repositories that have their own dependencies
norecursedirs =
    congress
    courtlistener
    epstein
    financial-disclosures
    openstates-monorepo
    politician-finance-pack
    gov-skills
    data
    .git
    .venv
    .refact
    __pycache__

# Default options: quiet output, show summary of skipped tests
addopts = -q -ra

# No test files at the top level; this will result in 0 tests collected
testpaths = .